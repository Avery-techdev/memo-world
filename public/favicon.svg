<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Memo·World">
  <defs>
    <pattern id="card-back-lines" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="7" height="7" fill="#1e1e1e" />
      <rect width="1.4" height="7" fill="#3a3a3a" />
    </pattern>
  </defs>

  <rect x="1" y="1" width="62" height="62" rx="14" fill="#050505" />

  <!-- Back card: face-down, diagonal line pattern -->
  <rect x="10" y="16" width="26" height="34" rx="4" fill="url(#card-back-lines)" stroke="#3a3a3a" stroke-width="1" transform="rotate(-8 23 33)" />

  <!-- Front card: flipped, matched, glowing white -->
  <rect x="28" y="14" width="26" height="34" rx="4" fill="#fafafa" transform="rotate(6 41 31)" />
  <path d="M35 31 L39 35 L47 25" transform="rotate(6 41 31)" fill="none" stroke="#050505" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
</svg>
